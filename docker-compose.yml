version: '3.8'

services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: always

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: always

  server:
    build: ./server
    ports:
      - "5000:5000"
    env_file: .env
    depends_on:
      - mongo
      - redis
    restart: always

  client:
    build: ./client
    ports:
      - "3000:3000"
    depends_on:
      - server
    restart: always

volumes:
  mongo_data:
